<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a6b3c">
  <title>Lieux - Carnet Irlande 2026</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="header">
    <h1>Lieux</h1>
  </header>

  <div class="main">
    <div class="filters">
      <select id="filter-jour">
        <option value="">Tous les jours</option>
        <option value="2026-08-08">Sam 8 août</option>
        <option value="2026-08-09">Dim 9 août</option>
        <option value="2026-08-10">Lun 10 août</option>
        <option value="2026-08-11">Mar 11 août</option>
        <option value="2026-08-12">Mer 12 août</option>
        <option value="2026-08-13">Jeu 13 août</option>
        <option value="2026-08-14">Ven 14 août</option>
        <option value="2026-08-15">Sam 15 août</option>
      </select>
      <select id="filter-cat">
        <option value="">Toutes catégories</option>
        <option value="hotel">Hôtel</option>
        <option value="monument">Monument</option>
        <option value="nature">Nature</option>
        <option value="ville">Ville</option>
        <option value="restaurant">Restaurant</option>
      </select>
    </div>

    <div id="lieux-list"></div>

    <button class="btn btn-primary btn-block mt-16" id="btn-add-lieu">+ Ajouter un lieu</button>
  </div>

  <!-- Modal ajout/édition -->
  <div class="modal-overlay hidden" id="modal-lieu">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-title">Ajouter un lieu</h2>
        <button class="modal-close" id="modal-close">&times;</button>
      </div>
      <form id="form-lieu">
        <input type="hidden" id="lieu-id">
        <div class="form-group">
          <label for="lieu-nom">Nom</label>
          <input type="text" id="lieu-nom" required>
        </div>
        <div class="form-group">
          <label for="lieu-desc">Description</label>
          <input type="text" id="lieu-desc">
        </div>
        <div class="form-group">
          <label for="lieu-cat">Catégorie</label>
          <select id="lieu-cat">
            <option value="monument">Monument</option>
            <option value="nature">Nature</option>
            <option value="ville">Ville</option>
            <option value="restaurant">Restaurant</option>
            <option value="hotel">Hôtel</option>
          </select>
        </div>
        <div class="form-group">
          <label for="lieu-jour">Jour</label>
          <select id="lieu-jour">
            <option value="2026-08-08">Sam 8 août</option>
            <option value="2026-08-09">Dim 9 août</option>
            <option value="2026-08-10">Lun 10 août</option>
            <option value="2026-08-11">Mar 11 août</option>
            <option value="2026-08-12">Mer 12 août</option>
            <option value="2026-08-13">Jeu 13 août</option>
            <option value="2026-08-14">Ven 14 août</option>
            <option value="2026-08-15">Sam 15 août</option>
          </select>
        </div>
        <div class="form-group">
          <label for="lieu-lat">Latitude</label>
          <input type="number" id="lieu-lat" step="0.0001">
        </div>
        <div class="form-group">
          <label for="lieu-lng">Longitude</label>
          <input type="number" id="lieu-lng" step="0.0001">
        </div>
        <div class="form-group">
          <label for="lieu-duree">Durée estimée</label>
          <input type="text" id="lieu-duree" placeholder="ex : 1h30">
        </div>
        <div class="form-group">
          <label for="lieu-statut">Statut</label>
          <select id="lieu-statut">
            <option value="a_voir">À voir</option>
            <option value="visite">Visité</option>
            <option value="annule">Annulé</option>
          </select>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Enregistrer</button>
        <button type="button" class="btn btn-danger btn-block mt-8 hidden" id="btn-delete-lieu">Supprimer ce lieu</button>
      </form>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="index.html" class="nav-item">
      <svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
      <span>Carte</span>
    </a>
    <a href="itineraire.html" class="nav-item">
      <svg viewBox="0 0 24 24"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>
      <span>Itin.</span>
    </a>
    <a href="lieux.html" class="nav-item active">
      <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      <span>Lieux</span>
    </a>
    <a href="journal.html" class="nav-item">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      <span>Journal</span>
    </a>
    <a href="budget.html" class="nav-item">
      <svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
      <span>Budget</span>
    </a>
  </nav>

  <script src="js/storage.js"></script>
  <script src="js/lieux.js"></script>
  <script src="js/pwa.js"></script>
</body>
</html>
