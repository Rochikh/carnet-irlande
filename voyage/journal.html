    <a href="budget.html" class="nav-item">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script src="js/csv-loader.js"></script>
  <script>
    function formatJournalDate(iso) {
      const d = new Date(iso + 'T00:00:00');
      if (isNaN(d)) return iso;
      return d.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });
    }

    async function renderJournal() {
      const data = await Data.load();
      if (data.errors.length) showDataError(data.errors);
      const entries = data.journal;
      const container = document.getElementById('journal-list');

      if (!entries.length) {
        container.innerHTML = '<p class="text-center card-sub" style="padding:24px 0">Aucune entrée de journal.</p>';
        return;
      }

      container.innerHTML = entries.map(e => {
        const titre = formatJournalDate(e.dateISO);
        const lieu = e.lieu ? `<div class="card-sub" style="margin-top:2px">📍 ${e.lieu}</div>` : '';
        const note = e.note
          ? `<div class="card-sub" style="margin-top:6px;white-space:pre-wrap;color:#333">${e.note}</div>`
          : `<div class="card-sub" style="margin-top:6px;font-style:italic;opacity:.7">Pas encore de note.</div>`;
        const photo = e.photo_url
          ? `<img src="${e.photo_url}" alt="" style="margin-top:8px;width:100%;border-radius:8px;display:block" loading="lazy">`
          : '';
        return `
          <div class="card">
            <div class="card-title" style="text-transform:capitalize">${titre}</div>
            ${lieu}
            ${note}
            ${photo}
          </div>`;
      }).join('');
    }

    renderJournal();
  </script>
  <script src="js/pwa.js"></script>
</body>
</html>
