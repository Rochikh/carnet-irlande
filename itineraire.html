<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a6b3c">
  <title>Itinéraire - Carnet Irlande 2026</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="header">
    <h1>Itinéraire</h1>
  </header>

  <div class="main" id="itineraire-content"></div>

  <nav class="bottom-nav">
    <a href="index.html" class="nav-item">
      <svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
      <span>Carte</span>
    </a>
    <a href="itineraire.html" class="nav-item active">
      <svg viewBox="0 0 24 24"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>
      <span>Itin.</span>
    </a>
    <a href="lieux.html" class="nav-item">
      <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      <span>Lieux</span>
    </a>
    <a href="journal.html" class="nav-item">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      <span>Journal</span>
    </a>
    <a href="budget.html" class="nav-item">
      <svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
      <span>Budget</span>
    </a>
  </nav>

  <script src="js/storage.js"></script>
  <script>
    const JOURS = [
      { date: '2026-08-08', label: 'Samedi 8 août', trajet: 'Arrivée à Dublin' },
      { date: '2026-08-09', label: 'Dimanche 9 août', trajet: 'Dublin → Galway (via Clonmacnoise, Athlone)' },
      { date: '2026-08-10', label: 'Lundi 10 août', trajet: 'Connemara (depuis Galway)' },
      { date: '2026-08-11', label: 'Mardi 11 août', trajet: 'Galway → Ennis (via Cliffs of Moher, Doolin)' },
      { date: '2026-08-12', label: 'Mercredi 12 août', trajet: 'Comté de Clare (depuis Ennis)' },
      { date: '2026-08-13', label: 'Jeudi 13 août', trajet: 'Ennis → Cashel (Rock of Cashel, Cahir)' },
      { date: '2026-08-14', label: 'Vendredi 14 août', trajet: 'Cashel → Dublin (via Glendalough)' },
      { date: '2026-08-15', label: 'Samedi 15 août', trajet: 'Départ de Dublin' }
    ];

    const CATEGORY_LABELS = {
      hotel: 'Hôtel', monument: 'Monument', nature: 'Nature',
      ville: 'Ville', restaurant: 'Restaurant'
    };

    function formatDateShort(d) {
      return new Date(d + 'T00:00:00').toLocaleDateString('fr-FR', { day: 'numeric', month: 'short' });
    }

    async function renderItineraire() {
      await Storage.init();
      const hotels = Storage.getHotels();
      const lieux = Storage.getLieux();
      const container = document.getElementById('itineraire-content');

      container.innerHTML = JOURS.map(jour => {
        const hotel = hotels.find(h => jour.date >= h.check_in && jour.date < h.check_out);
        const jourLieux = lieux.filter(l => l.jour === jour.date);

        let items = '';

        jourLieux.forEach(l => {
          items += `
            <div class="card">
              <div class="flex-between">
                <span class="card-badge badge-${l.categorie}">${CATEGORY_LABELS[l.categorie]}</span>
                <span class="badge-statut statut-${l.statut}">${l.statut === 'a_voir' ? 'À voir' : l.statut === 'visite' ? 'Visité' : 'Annulé'}</span>
              </div>
              <div class="card-title" style="margin-top:4px">${l.nom}</div>
              <div class="card-sub">${l.description}${l.duree ? ' | ' + l.duree : ''}</div>
            </div>`;
        });

        if (hotel) {
          items += `
            <div class="card" style="border-left:3px solid var(--cat-hotel)">
              <div class="card-badge badge-hotel">Nuit</div>
              <div class="card-title" style="margin-top:4px">${hotel.nom}</div>
              <div class="card-sub">${hotel.prix ? hotel.prix.toFixed(2) + ' €' : ''}</div>
            </div>`;
        }

        if (!items) {
          items = '<p class="card-sub" style="padding:8px 0">Aucune activité prévue.</p>';
        }

        return `
          <div class="jour-section">
            <div class="jour-header">${jour.label}<br><span style="font-weight:400;font-size:0.85rem">${jour.trajet}</span></div>
            ${items}
          </div>`;
      }).join('');
    }

    renderItineraire();
  </script>
  <script src="js/pwa.js"></script>
</body>
</html>
