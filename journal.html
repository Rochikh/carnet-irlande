<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a6b3c">
  <title>Journal - Carnet Irlande 2026</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="header">
    <h1>Journal de voyage</h1>
  </header>

  <div class="main">
    <div class="jour-tabs" id="jour-tabs"></div>
    <div class="form-group">
      <textarea id="journal-text" placeholder="Écrivez vos notes, impressions, anecdotes du jour..."></textarea>
    </div>
    <p class="card-sub text-center" id="save-status"></p>
  </div>

  <nav class="bottom-nav">
    <a href="index.html" class="nav-item">
      <svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
      <span>Carte</span>
    </a>
    <a href="itineraire.html" class="nav-item">
      <svg viewBox="0 0 24 24"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>
      <span>Itin.</span>
    </a>
    <a href="lieux.html" class="nav-item">
      <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      <span>Lieux</span>
    </a>
    <a href="journal.html" class="nav-item active">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      <span>Journal</span>
    </a>
    <a href="budget.html" class="nav-item">
      <svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
      <span>Budget</span>
    </a>
  </nav>

  <script src="js/storage.js"></script>
  <script>
    const JOURS = [
      { date: '2026-08-08', label: 'Sam 8' },
      { date: '2026-08-09', label: 'Dim 9' },
      { date: '2026-08-10', label: 'Lun 10' },
      { date: '2026-08-11', label: 'Mar 11' },
      { date: '2026-08-12', label: 'Mer 12' },
      { date: '2026-08-13', label: 'Jeu 13' },
      { date: '2026-08-14', label: 'Ven 14' },
      { date: '2026-08-15', label: 'Sam 15' }
    ];

    let selectedDate = JOURS[0].date;
    const textarea = document.getElementById('journal-text');
    const saveStatus = document.getElementById('save-status');
    let saveTimeout = null;

    function renderTabs() {
      const container = document.getElementById('jour-tabs');
      container.innerHTML = JOURS.map(j =>
        `<button class="jour-tab ${j.date === selectedDate ? 'active' : ''}" data-date="${j.date}">${j.label}</button>`
      ).join('');

      container.querySelectorAll('.jour-tab').forEach(btn => {
        btn.addEventListener('click', () => {
          selectedDate = btn.dataset.date;
          renderTabs();
          loadEntry();
        });
      });
    }

    function loadEntry() {
      const journal = Storage.getJournal();
      textarea.value = journal[selectedDate] || '';
    }

    function saveEntry() {
      Storage.saveJournalEntry(selectedDate, textarea.value);
      saveStatus.textContent = 'Sauvegarde automatique effectuée';
      setTimeout(() => { saveStatus.textContent = ''; }, 2000);
    }

    textarea.addEventListener('input', () => {
      clearTimeout(saveTimeout);
      saveTimeout = setTimeout(saveEntry, 500);
    });

    (async () => {
      await Storage.init();
      renderTabs();
      loadEntry();
    })();
  </script>
  <script src="js/pwa.js"></script>
</body>
</html>
